<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrange the Planets</title>

    <link rel="stylesheet" href="indexStyle.css">
    <script src="indexScript.js" defer></script>
</head>

<body>

    <header>
        <h1>🌍 Arrange the Planets 🌍</h1>
    </header>

    <!-- DRAGGABLE PLANETS -->
    <div class="draggableContainer">

        <div class="box" draggable="true" id="drag1">
            <img src="Sun.jpg" alt="Sun">
        </div>

        <div class="box" draggable="true" id="drag2">
            <img src="Mercury.jpg" alt="Mercury">
        </div>

        <div class="box" draggable="true" id="drag3">
            <img src="Venus.jpg" alt="Venus">
        </div>

        <div class="box" draggable="true" id="drag4">
            <img src="Earth.jpg" alt="Earth">
        </div>

        <div class="box" draggable="true" id="drag5">
            <img src="Mars.jpg" alt="Mars">
        </div>

        <div class="box" draggable="true" id="drag6">
            <img src="Jupiter.jpg" alt="Jupiter">
        </div>

        <div class="box" draggable="true" id="drag7">
            <img src="Saturn.jpg" alt="Saturn">
        </div>

        <div class="box" draggable="true" id="drag8">
            <img src="Uranus.jpg" alt="Uranus">
        </div>

        <div class="box" draggable="true" id="drag9">
            <img src="Neptune.jpg" alt="Neptune">
        </div>

        <div class="box" draggable="true" id="drag10">
            <img src="Pluto.jpg" alt="Pluto">
        </div>

    </div>

    <!-- DROP AREAS -->
<div class="droppableContainer">

    <div class="droppable" data-answer="drag1">
        Sun
    </div>

    <div class="droppable" data-answer="drag2">
        Mercury
    </div>

    <div class="droppable" data-answer="drag3">
        Venus
    </div>

    <div class="droppable" data-answer="drag4">
        Earth
    </div>

    <div class="droppable" data-answer="drag5">
        Mars
    </div>

    <div class="droppable" data-answer="drag6">
        Jupiter
    </div>

    <div class="droppable" data-answer="drag7">
        Saturn
    </div>

    <div class="droppable" data-answer="drag8">
        Uranus
    </div>

    <div class="droppable" data-answer="drag9">
        Neptune
    </div>

    <div class="droppable" data-answer="drag10">
        Pluto
    </div>

</div>

    <!-- SCORE -->
    <div id="remarksDiv"></div>

    <div id="scoreSection">
        Score: 0
    </div>

</body>
</html>
